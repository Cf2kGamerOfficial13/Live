<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>CF2KGAMER TAMBAYAN PH | PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.3/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="limitdev.js"></script>
<script src="www.varcel.com.js"></script>
<script src="security.js"></script>
<script src="ads-config.js"></script>
<script src="guardian.js"></script>

<style>
:root{
--primary:#66c8ff;
--accent:#9df4ff;
--bg1:#020814;
--bg2:#081d38;
--glass:rgba(11,33,60,.68);
--border:rgba(125,220,255,.22);
}
*{
margin:0;
padding:0;
box-sizing:border-box;
}
html,body{
height:100%;
overflow:hidden;
font-family:Inter,sans-serif;
color:#fff;
background:
radial-gradient(circle at top,#1a5ea5 0%,#0b2447 38%,#020814 100%);
}
.wrapper{
height:100%;
display:flex;
flex-direction:column;
}
.nav-bar{
height:70px;
padding:0 18px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(5,22,46,.72);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(120,210,255,.25);
box-shadow:
0 8px 25px rgba(0,0,0,.35),
0 0 20px rgba(70,170,255,.15);
}
.back-btn{
text-decoration:none;
padding:9px 18px;
border-radius:14px;
font-size:11px;
font-weight:700;
font-family:Orbitron;
color:#fff;
background:linear-gradient(135deg,#147dff,#35d8ff);
}
.brand-title{
font-family:Orbitron;
font-size:15px;
letter-spacing:1px;
font-weight:800;
color:#c9f6ff;
}
#total-channels{
font-size:9px;
margin-top:4px;
font-family:Orbitron;
color:#88dfff;
}
#now-playing{
width:90px;
text-align:right;
font-size:10px;
font-family:Orbitron;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.main-layout{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}
.video-box{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
}
#video{
width:100%;
height:100%;
background:#000;
}
#status-msg{
position:absolute;
top:15px;
left:15px;
display:none;
padding:10px 16px;
border-radius:14px;
background:rgba(8,35,70,.85);
font-size:11px;
font-family:Orbitron;
}
.sidebar{
flex:1;
display:flex;
flex-direction:column;
background:linear-gradient(
180deg,
rgba(7,28,52,.92),
rgba(3,15,30,.97)
);
overflow:hidden;
}
.search-area{
padding:14px;
border-bottom:1px solid var(--border);
}
#channel-search{
width:100%;
padding:14px 15px;
border-radius:16px;
border:1px solid rgba(110,200,255,.22);
background:rgba(15,45,78,.6);
color:#fff;
outline:none;
}
.scroll-list{
flex:1;
overflow-y:auto;
padding:14px;
display:grid;
gap:13px;
}
.channel-item{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:18px;
background:var(--glass);
border:1px solid var(--border);
cursor:pointer;
transition:.25s;
}
.channel-item:hover,
.channel-item.active{
transform:translateY(-2px);
background:linear-gradient(
135deg,
rgba(36,125,255,.9),
rgba(0,215,255,.8)
);
}
.channel-item.active .ch-title{
color:#001426;
}
.ch-logo{
width:68px;
height:44px;
border-radius:12px;
object-fit:contain;
background:#03111f;
}
.ch-title{
font-size:13px;
font-weight:700;
}
.ch-status{
font-size:10px;
margin-top:3px;
font-family:Orbitron;
color:#7fe3ff;
}
@media (orientation:landscape){
.main-layout{
flex-direction:row;
height:calc(100vh - 70px);
}
.video-box{
flex:2.3;
height:100%;
aspect-ratio:auto;
}
.sidebar{
flex:1;
max-width:430px;
}
}
</style>
</head>
<body>

<div class="wrapper">

<header class="nav-bar">
<a href="index.html" class="back-btn">
EXIT
</a>

<div style="text-align:center">
<h1 class="brand-title">
CF2KGAMER TAMBAYAN PH
</h1>

<div id="total-channels">
0 CHANNELS
</div>
</div>

<div id="now-playing">
LIVE
</div>
</header>

<main class="main-layout">

<section class="video-box">

<div id="status-msg">
LOADING...
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

</section>

<aside class="sidebar">

<div class="search-area">
<input
type="text"
id="channel-search"
placeholder="Search channels..."
onkeyup="filterChannels()">
</div>

<div
class="scroll-list"
id="channel-list-container">
</div>

</aside>

</main>
</div>

<script>
let channels=[];
const videoElement=document.getElementById("video");
const statusMsg=document.getElementById("status-msg");

let hlsPlayer=null;
let shakaPlayer=null;



async function loadChannels(){

try{

statusMsg.style.display="block";
statusMsg.innerText="LOADING CHANNELS...";

const res=await fetch(
"channels.js?v="+Date.now(),
{
cache:"no-store",
headers:{
"Cache-Control":"no-cache",
"Pragma":"no-cache"
}
}
);

let txt=await res.text();



if(
txt.includes("const channels")
||
txt.includes("let channels")
){

txt=txt
.replace("const channels","channels")
.replace("let channels","channels");

eval(txt);

}

if(
!Array.isArray(channels)
||
channels.length===0
){
throw "no channels";
}

statusMsg.style.display="none";

return true;

}catch(e){

try{

const fallback=await fetch(
"./channels.json?v="+Date.now(),
{
cache:"no-store"
}
);

channels=await fallback.json();

return true;

}catch(x){

statusMsg.style.display="block";
statusMsg.innerText="CHANNEL LOAD FAILED";
return false;

}

}

}



async function initApp(){

shaka.polyfill.installAll();

shakaPlayer=
new shaka.Player(videoElement);

shakaPlayer.addEventListener(
'error',
()=>{
statusMsg.style.display='block';
statusMsg.innerText=
"STREAM ERROR";
}
);

let loaded=
await loadChannels();

if(loaded){

renderChannels();

if(channels.length){

setTimeout(()=>{
let f=
document.querySelector(
".channel-item"
);
if(f)f.click();
},800);

}

}

}



async function switchChannel(
ch,
element
){

document
.querySelectorAll(".channel-item")
.forEach(el=>
el.classList.remove(
"active"
)
);

element.classList.add(
"active"
);

document
.getElementById(
"now-playing"
).innerText=ch.title;

statusMsg.style.display=
"block";

statusMsg.innerText=
"CONNECTING...";

if(hlsPlayer){
hlsPlayer.destroy();
hlsPlayer=null;
}

await shakaPlayer.unload();

let url=ch.file;

try{

if(
url.includes(".mpd")
){

if(ch.drm){

shakaPlayer.configure({
drm:{
clearKeys:{
[ch.drm.clearkey.keyId]:
ch.drm.clearkey.key
}
}
});

}

await shakaPlayer.load(url);

}else{

if(Hls.isSupported()){

hlsPlayer=
new Hls();

hlsPlayer.loadSource(
url
);

hlsPlayer.attachMedia(
videoElement
);

}else{

videoElement.src=url;

}

}

videoElement.play();

setTimeout(()=>{
statusMsg.style.display=
"none";
},2000);

}catch(e){

statusMsg.style.display=
"block";

statusMsg.innerText=
"CHANNEL OFFLINE";

}

}



function renderChannels(){

let container=
document.getElementById(
"channel-list-container"
);

document.getElementById(
"total-channels"
).innerText=
channels.length+
" CHANNELS";

container.innerHTML="";

channels.forEach(ch=>{

let item=
document.createElement(
"div"
);

item.className=
"channel-item";

item.innerHTML=`
<img
class="ch-logo"
src="${ch.image||''}"
onerror="this.src='https://via.placeholder.com/70x50/111/66c8ff?text=TV'">

<div>
<div class="ch-title">
${ch.title}
</div>

<div class="ch-status">
● ONLINE
</div>
</div>
`;

item.onclick=
()=>switchChannel(
ch,
item
);

container.appendChild(
item
);

});

}



function filterChannels(){

let val=
document
.getElementById(
"channel-search"
)
.value
.toLowerCase();

document
.querySelectorAll(
".channel-item"
)
.forEach(item=>{

let t=
item
.querySelector(
".ch-title"
)
.textContent
.toLowerCase();

item.style.display=
t.includes(val)
?
"flex"
:
"none";

});

}



document.addEventListener(
"DOMContentLoaded",
initApp
);
</script>

</body>
                              </html>
